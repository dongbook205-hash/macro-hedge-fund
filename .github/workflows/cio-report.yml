name: Daily Macro CIO Report Automation

on:
  schedule:
    # 한국 시간(UTC+9) 매일 새벽 05:00 자동 실행 (지연 방지를 위해 앞당김)
    - cron: '0 20 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4  # 최신 버전으로 업그레이드하여 경고 제거

    - name: Set up Python
      uses: actions/setup-python@v5  # 최신 버전으로 업그레이드
      with:
        python-version: '3.11'  # 안정적인 파이썬 버전

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-genai  # 최신 구글 AI SDK 설치

    - name: Run AI Research Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python report.py

    # ✉️ 이메일 발송 단계 (오류 차단을 위해 file_as_body 방식으로 전면 수정)
    - name: Send Email via Gmail
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "[Daily Macro CIO Report] 오늘의 AI 분석 보고서 전문"
        to: user@example.com  # 👈 여기에 실제 받으실 이메일 주소를 입력하세요!
        from: AI Report Automation
        
        # 💡 [핵심 변경] report.py가 최종적으로 만들어내는 마크다운 파일명을 지정합니다.
        # 만약 파일명이 매일 바뀌는 구조라면 'report.md' 대신 아래의 우회법을 참고하세요.
        file_as_body: report.md  

    - name: Commit and Push to GitHub (Obsidian Sync)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git diff --quiet && git diff --staged --quiet || (git commit -m "Add Daily CIO Report $(date +'%Y-%m-%d')" && git push)
