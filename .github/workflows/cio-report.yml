name: Daily Macro CIO Report Automation

on:
  schedule:
    # UTC 기준 21:30 = 한국 시간(UTC+9) 다음날 새벽 06:30
    - cron: '30 21 * * *'
  workflow_dispatch: # 수동 실행 버튼을 활성화하는 코드

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-generativeai

    - name: Run AI Research Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python report.py

    - name: Commit and Push to GitHub (Obsidian Sync)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git diff --quiet && git diff --staged --quiet || (git commit -m "Add Daily CIO Report $(date +'%Y-%m-%d')" && git push)
